<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BingoHome - Admin</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #05050a; color: #f1f5f9; margin: 0; padding: 15px; }
        .card { background: #12131a; border: 1px solid #222530; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        button { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-draw { background: #ef4444; color: white; font-size: 1.5rem; width: 100%; }
        .ball { display: inline-block; width: 35px; height: 35px; line-height: 35px; border-radius: 50%; background: #f59e0b; color: black; font-weight: bold; text-align: center; margin: 3px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { border: 1px solid #222530; padding: 8px; text-align: center; }
        th { background: #1a1c26; color: #f59e0b; }
    </style>
</head>
<body>

    <h2>🛡️ Administration & Boulier</h2>

    <!-- BOULIER EN DIRECT -->
    <div class="card" style="text-align: center;">
        <button class="btn-draw" onclick="tirerBoule()">🔴 TIRER UNE BOULE</button>
        <div style="margin-top:15px; font-size: 1.2rem;">Dernière boule : <span id="current-ball" style="font-size:2rem; color:#ef4444; font-weight:900;">--</span></div>
        <div id="history-balls" style="margin-top:10px;"></div>
    </div>

    <!-- LISTE DES JOUEURS CRÉÉS -->
    <div class="card">
        <h3>👥 Joueurs Enregistrés</h3>
        <table>
            <thead><tr><th>Nom</th><th>Code</th><th>Pions</th><th>Statut</th></tr></thead>
            <tbody id="table-joueurs"></tbody>
        </table>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        socket.emit('admin-init');

        function tirerBoule() { socket.emit('admin-draw'); }

        socket.on('new-ball', (data) => {
            document.getElementById('current-ball').innerText = data.actuelle;
            const container = document.getElementById('history-balls');
            container.innerHTML = '';
            data.historique.forEach(num => {
                container.innerHTML += `<span class="ball">${num}</span>`;
            });
        });

        socket.on('refresh-admin', (data) => {
            const tbody = document.getElementById('table-joueurs');
            tbody.innerHTML = '';
            data.players.forEach(p => {
                tbody.innerHTML += `<tr>
                    <td>${p.nom}</td>
                    <td><strong style="color:#10b981;">${p.code}</strong></td>
                    <td>${p.pions}</td>
                    <td>${p.online ? '🟢 En Ligne' : '🔴 Hors Ligne'}</td>
                </tr>`;
            });
        });

        socket.on('admin-receive-bingo', (data) => { alert(`🔥 ALERTE PAINA DE ${data.code} !`); });
    </script>
</body>
</html>
