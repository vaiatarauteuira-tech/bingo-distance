<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Premium - Bingo</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 15px; padding-bottom: 90px; }
        .main-container { max-width: 900px; margin: 0 auto; }
        
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 18px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h3 { margin-top: 0; color: #38bdf8; display: flex; align-items: center; gap: 8px; font-size: 1.1rem; }
        
        .wallet-bar { display: flex; justify-content: space-between; align-items: center; background: #1e293b; padding: 12px 20px; border-radius: 12px; border-bottom: 4px solid #06b6d4; margin-bottom: 15px; }
        .wallet-info { font-size: 1.3rem; font-weight: bold; color: #06b6d4; }
        
        button { padding: 10px 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 13px; transition: 0.2s; }
        button.primary { background: #0284c7; color: white; } button.primary:hover { background: #0369a1; }
        button.sec { background: #475569; color: white; } button.sec:hover { background: #334155; }
        button.action-btn { background: #06b6d4; color: #0f172a; }
        button.nav-btn { background: #f59e0b; color: white; padding: 6px 12px; }

        .fiche-control { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; background: #0f172a; padding: 8px; border-radius: 8px; }
        .board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; background: #0f172a; padding: 8px; border-radius: 8px; }
        .cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: #334155; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 1.1rem; border: 1px solid #475569; }
        .cell.marked { background: #0284c7; color: white; box-shadow: 0 0 8px rgba(2, 132, 199, 0.5); border-color: #38bdf8; }

        .verif-grid { display: grid; grid-template-columns: repeat(15, 1fr); gap: 3px; background: #0f172a; padding: 8px; border-radius: 8px; margin-top: 10px; }
        @media (max-width: 600px) { .verif-grid { grid-template-columns: repeat(10, 1fr); } }
        .verif-num { background: #1e293b; border: 1px solid #334155; text-align: center; font-size: 11px; padding: 4px 0; border-radius: 3px; color: #64748b; font-weight: bold; }
        .verif-num.out { background: #ef4444; color: white; border-color: #f87171; box-shadow: 0 0 4px rgba(239, 68, 68, 0.4); }

        input[type="number"], select { width: 100%; padding: 10px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: white; box-sizing: border-box; margin-bottom: 10px; font-size: 15px; }
        .price-tag { background: #10b981; color: #0f172a; font-weight: bold; padding: 8px; border-radius: 6px; text-align: center; margin-bottom: 10px; font-size: 14px; }

        .bottom-live-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1e293b; border-top: 3px solid #ef4444; padding: 8px 15px; display: flex; align-items: center; gap: 15px; z-index: 999; box-shadow: 0 -3px 10px rgba(0,0,0,0.3); height: 50px; }
        .live-ball-circle { width: 44px; height: 44px; background: #ef4444; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; font-weight: bold; }
        .live-history-zone { overflow-x: auto; white-space: nowrap; font-size: 13px; color: #cbd5e1; font-weight: 500; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; padding: 15px; box-sizing: border-box; }
        .modal-content { background: #1e293b; border: 1px solid #475569; border-radius: 12px; padding: 20px; max-width: 550px; width: 100%; max-height: 80vh; overflow-y: auto; }
        .statement-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 15px; }
        .statement-table th { background: #0f172a; padding: 8px; text-align: left; color: #94a3b8; }
        .statement-table td { padding: 8px; border-bottom: 1px solid #334155; }
        .pos { color: #4ade80; font-weight: bold; } .neg { color: #f87171; font-weight: bold; }
    </style>
</head>
<body>

    <div class="main-container">
        
        <div class="wallet-bar">
            <div>
                <div style="font-size: 11px; color: #94a3b8;">MON PORTESOLDE</div>
                <div class="wallet-info" id="solde-pions">0 Pions</div>
            </div>
            <button class="action-btn" onclick="ouvrirReleve()">📊 Mon Relevé</button>
        </div>

        <div class="card">
            <h3>🎲 Mes Cartons de Bingo commandés</h3>
            <button class="primary" id="btn-ouvrir-fiches" onclick="ouvrirFichesZone()" style="width:100%;">🔍 Déplier mes fiches de jeu</button>
            
            <div id="fiches-zone" style="display:none; margin-top:10px;">
                <div class="fiche-control">
                    <button class="nav-btn" onclick="fichePrecedente()">⬅️ Précédent</button>
                    <span id="fiche-index-label" style="font-weight:bold; color:#f59e0b;">Fiche 1 / 1</span>
                    <button class="nav-btn" onclick="ficheSuivante()">Suivant ➡️</button>
                </div>
                <button class="sec" id="btn-auto" onclick="toggleAutoMode()" style="width:100%; margin-bottom:8px;">🤖 Coche Automatique : OFF</button>
                <div class="board" id="bingo-board"></div>
            </div>
        </div>

        <div class="card">
            <h3>📋 Tableau Général de Vérification (1 à 75)</h3>
            <div class="verif-grid" id="tableau-verification"></div>
        </div>

        <!-- MODE DE RECHARGE : VIREMENT OU DÉBLOCAGE DIRECT -->
        <div class="card">
            <h3>💳 Demande de Pions / Déblocage Caisse</h3>
            
            <label style="font-size:12px; color:#94a3b8;">Méthode de paiement :</label>
            <select id="achat-methode">
                <option value="Déblocage direct (Espèces Caisse)">Déblocage direct auprès de l'Orga/Admin ⚡</option>
                <option value="Virement Bancaire en ligne">Virement bancaire classique 🏦</option>
            </select>

            <label style="font-size:12px; color:#94a3b8; display:block; margin-top:5px; margin-bottom:4px;">Nombre de pions (1 pion = 100fr) :</label>
            <input type="number" id="achat-quantite" value="5" min="1" oninput="calculerPrixAchat()">
            
            <div class="price-tag" id="prix-calcule">💵 Valeur : 500 fr</div>
            <button class="primary" onclick="envoyerRecharge()" style="background:#10b981; width:100%;">Envoyer la demande de validation</button>
        </div>

    </div>

    <div class="modal" id="modal-releve">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #475569; padding-bottom:8px;">
                <h3 style="margin:0;">📊 Relevé d'Opérations</h3>
                <button onclick="fermerReleve()" style="background:#ef4444; color:white; padding:4px 8px;">X</button>
            </div>
            <table class="statement-table">
                <thead><tr><th>Date</th><th>Description</th><th>Montant</th></tr></thead>
                <tbody id="statement-tbody"></tbody>
            </table>
        </div>
    </div>

    <div class="bottom-live-bar">
        <div class="live-ball-circle" id="live-ball">-</div>
        <div class="live-history-zone" id="history">En attente du premier tirage...</div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const monCode = sessionStorage.getItem('joueurCode');
        let autoCoche = false;
        let fichesJoueur = []; 
        let indexFicheActuelle = 0;
        let totalFichesCommandees = 1;

        if(!monCode) { window.location.href = '/'; } 
        else { socket.emit('player-login', monCode); }

        function calculerPrixAchat() {
            const qte = document.getElementById('achat-quantite').value || 0;
            document.getElementById('prix-calcule').textContent = `💵 Valeur : ${(qte * 100).toLocaleString()} fr`;
        }

        function initialiserTableauVerif() {
            const grid = document.getElementById('tableau-verification');
            grid.innerHTML = '';
            for(let i=1; i<=75; i++) {
                const box = document.createElement('div');
                box.className = 'verif-num';
                box.id = `verif-${i}`;
                box.textContent = i;
                grid.appendChild(box);
            }
        }

        socket.on('login-success-dashboard', (data) => {
            document.title = `Espace - ${data.player.nom}`;
            totalFichesCommandees = data.player.nombreFiches || 1;
            refreshUI(data.player);
            initialiserTableauVerif();

            fichesJoueur = Array.from({length: totalFichesCommandees}, (_, idx) => ({
                id: idx + 1,
                numeros: Array.from({length: 25}, () => Math.floor(Math.random() * 75) + 1),
                coches: new Array(25).fill(false)
            }));
            fichesJoueur.forEach(f => f.coches[12] = true);

            if(data.liveHistory.length > 0) {
                document.getElementById('live-ball').textContent = data.liveHistory[data.liveHistory.length - 1];
                document.getElementById('history').textContent = "Derniers tirages : " + data.liveHistory.slice(-5).join(' - ');
                data.liveHistory.forEach(b => {
                    const el = document.getElementById(`verif-${b}`);
                    if(el) el.classList.add('out');
                });
            }
        });

        socket.on('update-dashboard', (player) => { 
            totalFichesCommandees = player.nombreFiches || 1;
            
            // Mettre à jour la liste des fiches de manière à ne pas effacer les cases déjà cochées par le joueur
            while(fichesJoueur.length < totalFichesCommandees) {
                const newId = fichesJoueur.length + 1;
                const newFiche = {
                    id: newId,
                    numeros: Array.from({length: 25}, () => Math.floor(Math.random() * 75) + 1),
                    coches: new Array(25).fill(false)
                };
                newFiche.coches[12] = true;
                fichesJoueur.push(newFiche);
            }
            
            refreshUI(player); 
            renderCarton();
        });
        
        socket.on('notification', (msg) => { alert(msg); });

        socket.on('new-ball', (data) => {
            const boule = data.actuelle;
            document.getElementById('live-ball').textContent = boule;
            document.getElementById('history').textContent = "Derniers tirages : " + data.historique.slice(-6).join(' - ');
            
            const el = document.getElementById(`verif-${boule}`);
            if(el) el.classList.add('out');
            
            if ('speechSynthesis' in window) {
                let utterance = new SpeechSynthesisUtterance(`Numéro ${boule}`);
                utterance.lang = 'fr-FR';
                window.speechSynthesis.speak(utterance);
            }

            if(autoCoche) {
                fichesJoueur.forEach(f => {
                    const idx = f.numeros.indexOf(boule);
                    if(idx !== -1) f.coches[idx] = true;
                });
                renderCarton();
            }
        });

        function ouvrirFichesZone() {
            document.getElementById('btn-ouvrir-fiches').style.display = 'none';
            document.getElementById('fiches-zone').style.display = 'block';
            renderCarton();
        }

        function renderCarton() {
            if(fichesJoueur.length === 0) return;
            const currentFiche = fichesJoueur[indexFicheActuelle];
            document.getElementById('fiche-index-label').textContent = `Fiche ${currentFiche.id} / ${fichesJoueur.length}`;
            
            const b = document.getElementById('bingo-board');
            b.innerHTML = '';
            currentFiche.numeros.forEach((num, idx) => {
                const c = document.createElement('div');
                c.className = 'cell';
                if(idx === 12) {
                    c.textContent = "FREE";
                    c.classList.add('marked');
                } else {
                    c.textContent = num;
                    if(currentFiche.coches[idx]) c.classList.add('marked');
                    c.onclick = () => {
                        if(!autoCoche) {
                            currentFiche.coches[idx] = !currentFiche.coches[idx];
                            c.classList.toggle('marked');
                        }
                    };
                }
                b.appendChild(c);
            });
        }

        function ficheSuivante() {
            if(indexFicheActuelle < fichesJoueur.length - 1) {
                indexFicheActuelle++;
                renderCarton();
            }
        }

        function fichePrecedente() {
            if(indexFicheActuelle > 0) {
                indexFicheActuelle--;
                renderCarton();
            }
        }

        function toggleAutoMode() {
            autoCoche = !autoCoche;
            const btn = document.getElementById('btn-auto');
            btn.textContent = autoCoche ? "🤖 Coche Automatique : ACTIVÉ" : "🤖 Coche Automatique : OFF";
            btn.style.background = autoCoche ? "#22c55e" : "#475569";
        }

        function refreshUI(player) {
            document.getElementById('solde-pions').textContent = `${player.pions} Pions`;
            const tbody = document.getElementById('statement-tbody');
            tbody.innerHTML = '';
            player.historiquePions.forEach(h => {
                const cl = h.montant.startsWith('+') ? 'pos' : 'neg';
                tbody.innerHTML += `<tr><td>${h.date}</td><td>${h.description}</td><td class="${cl}">${h.montant} Pions</td></tr>`;
            });
        }

        function ouvrirReleve() { document.getElementById('modal-releve').style.display = 'flex'; }
        function fermerReleve() { document.getElementById('modal-releve').style.display = 'none'; }

        function envoyerRecharge() {
            const qte = document.getElementById('achat-quantite').value;
            const methode = document.getElementById('achat-methode').value;
            if(qte < 1) return alert("Quantité incorrecte.");
            
            socket.emit('player-order', { code: monCode, type: methode, qte: qte });
            alert(`Demande envoyée en Caisse ! Mode choisi : ${methode}`);
        }
    </script>
</body>
</html>
