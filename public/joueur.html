<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PA'INA 987 - Joueur</title>
<style>
body{font-family:Segoe UI,sans-serif;background:#05050a;color:#fff;margin:0;padding:15px}
.card{background:#12131a;border:1px solid #222530;border-radius:12px;padding:15px;margin-bottom:15px}
#grille-bingo{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.case,.head{padding:8px;text-align:center;border-radius:6px}
.case{background:#1a1c26;border:1px solid #333}
.head{background:#f59e0b;color:#000;font-weight:bold}
.active{background:#16a34a!important;color:#fff!important;font-weight:bold}
</style>
</head>
<body>
<div class="card" style="text-align:center">
<h2 id="display-nom">Joueur</h2>
<p id="display-code">CODE:-</p>
<div>🪙 <span id="display-pions">0</span> pions</div>
</div>

<div class="card" style="text-align:center">
<h3>🎱 Dernier numéro</h3>
<div id="numero-tire" style="font-size:64px;color:#f59e0b;font-weight:bold">-</div>
</div>

<div class="card">
<h3>🎱 Tableau BINGO</h3>
<div id="grille-bingo"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket=io();
const monCode=sessionStorage.getItem("joueurCode");
if(!monCode) location.href="/";
socket.emit("player-login",monCode);

function creerGrille(){
 const g=document.getElementById("grille-bingo");
 g.innerHTML="";
 [["B",1,15],["I",16,30],["N",31,45],["G",46,60],["O",61,75]].forEach(c=>{
   const h=document.createElement("div");h.className="head";h.textContent=c[0];g.appendChild(h);
   for(let i=c[1];i<=c[2];i++){let d=document.createElement("div");d.className="case";d.id="case-"+i;d.textContent=i;g.appendChild(d);}
 });
}
creerGrille();

function lettre(n){if(n<=15)return"B";if(n<=30)return"I";if(n<=45)return"N";if(n<=60)return"G";return"O";}
function colorer(hist){
 hist.forEach(n=>{
   const c=document.getElementById("case-"+n);
   if(c)c.classList.add("active");
 });
}
socket.on("login-success-dashboard",data=>{
 const p=data.player;
 display_nom.textContent=p.nom;
 display_code.textContent="CODE: "+p.code;
 display_pions.textContent=p.pions;
 colorer(data.liveHistory||[]);
});
socket.on("update-dashboard",p=>{
 display_nom.textContent=p.nom;
 display_code.textContent="CODE: "+p.code;
 display_pions.textContent=p.pions;
});
socket.on("new-ball",data=>{
 numero_tire.textContent=lettre(data.actuelle)+" "+data.actuelle;
 colorer(data.historique||[]);
});
</script>
</body></html>
