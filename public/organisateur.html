<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Organisateur - BingoHome</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #05050a; color: #f1f5f9; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: #12131a; border: 1px solid #222530; border-radius: 12px; padding: 20px; margin-bottom: 15px; }
        h2, h3 { margin-top: 0; color: #38bdf8; text-transform: uppercase; }
        .balance-box { background: #1a1c26; border: 1px solid #2d3142; padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 15px; }
        .balance-val { font-size: 1.6rem; font-weight: bold; color: #f59e0b; }
        button { width: 100%; padding: 12px; background: linear-gradient(135deg, #a855f7, #6b21a8); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px; }
        input { width: 100%; padding: 12px; background: #1a1c26; border: 1px solid #2d3142; border-radius: 8px; color: white; box-sizing: border-box; margin-bottom: 15px; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🎪 Tableau Organisateur</h2>
        <p style="color:#64748b; font-size:13px;">Achat de séries personnalisées auprès de la direction générale.</p>

        <!-- PORTEMONNAIE ORGA -->
        <div class="balance-box">
            <div style="font-size:12px; color:#94a3b8;">MON BUDGET CAISSE DISPONIBLE</div>
            <div class="balance-val" id="txt-orga-credit">0 XPF</div>
        </div>

        <div class="card" style="border-color: #a855f7;">
            <h3>🛒 Commander des Fiches à l'Admin</h3>
            <p style="font-size:12px; color:#94a3b8;" id="txt-catalogue-info">Prix unitaire : 50 XPF / Fiche<br>Stock dispo chez l'admin : 0</p>
            
            <label style="font-size:12px; color:#94a3b8; display:block; margin-bottom:5px;">Quantité de fiches personnalisées à acheter :</label>
            <input type="number" id="buy-qte" value="10" min="1">
            
            <button onclick="acheterFiches()">Acheter les fiches de la direction</button>
        </div>

        <div class="card">
            <h3>📦 Mon Stock de fiches prêtes à distribuer</h3>
            <div style="font-size:1.3rem; font-weight:bold; text-align:center; color:#10b981;" id="txt-orga-fiches-count">0 Fiches en réserve</div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        socket.emit('orga-init');

        socket.on('refresh-orga', (data) => {
            document.getElementById('txt-orga-credit').textContent = `${data.creditOrganisateur.toLocaleString()} XPF`;
            document.getElementById('txt-orga-fiches-count').textContent = `${data.fichesDisponibles} Fiches en réserve`;
            document.getElementById('txt-catalogue-info').innerHTML = `Tarif : <strong>${data.cataloguePrixFiche} XPF</strong> par fiche<br>Fiches disponibles chez l'Admin : <strong>${data.stockAdminCount}</strong>`;
        });

        socket.on('orga-notification', (msg) => { alert(msg); });

        function acheterFiches() {
            const qte = document.getElementById('buy-qte').value;
            socket.emit('orga-buy-fiches', qte);
        }
    </script>
</body>
</html>
