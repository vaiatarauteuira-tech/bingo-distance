<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BingoHome - Organisateur</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #05050a; color: #f1f5f9; margin: 0; padding: 15px; }
        .card { background: #12131a; border: 1px solid #222530; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        input, select { width: 100%; padding: 10px; background: #1a1c26; border: 1px solid #2d3142; border-radius: 6px; color: white; margin-bottom: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-green { background: #10b981; color: white; }
        .btn-purple { background: #a855f7; color: white; }
        .btn-gold { background: #f59e0b; color: black; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { border: 1px solid #222530; padding: 8px; text-align: center; }
        th { background: #1a1c26; color: #f59e0b; }
    </style>
</head>
<body>

    <h2>🎪 Espace Régie & Animateur</h2>

    <!-- ⚡ CRÉATION DIRECTE D'UN JOUEUR -->
    <div class="card" style="border-left: 4px solid #10b981;">
        <h3 style="color:#10b981;">➕ Créer un Joueur (Obtenir le Code)</h3>
        <input type="text" id="new-nom" placeholder="Nom et Prénom du Joueur">
        <input type="tel" id="new-tel" placeholder="Téléphone (optionnel)">
        <button class="btn-green" onclick="creerJoueur()">⚡ GÉNÉRER CODE UNIQUE</button>
        <div id="display-created-code" style="margin-top:10px; text-align:center; font-weight:bold;"></div>
    </div>

    <!-- 📄 ATTRIBUER UN TICKET PDF -->
    <div class="card" style="border-left: 4px solid #a855f7;">
        <h3 style="color:#a855f7;">📄 Distribuer un Ticket PDF</h3>
        <input type="text" id="pdf-code" placeholder="Code Joueur (ex: BH-1234)">
        <input type="text" id="pdf-serie" value="Grande Grille Quine">
        <select id="pdf-fichier">
            <option value="serie_A.pdf">serie_A.pdf</option>
            <option value="serie_B.pdf">serie_B.pdf</option>
        </select>
        <div style="display:flex; gap:10px;">
            <input type="number" id="pdf-page-start" value="1" placeholder="Page Début">
            <input type="number" id="pdf-page-end" value="1" placeholder="Page Fin">
        </div>
        <button class="btn-purple" onclick="envoyerPDF()">📤 Envoyer Ticket</button>
    </div>

    <!-- 🪙 DEMANDES DE PIONS DU JOUEUR -->
    <div class="card" style="border-left: 4px solid #f59e0b;">
        <h3 style="color:#f59e0b;">🪙 Demandes de Pions en Attente</h3>
        <table>
            <thead><tr><th>Joueur</th><th>Code</th><th>Pions</th><th>Action</th></tr></thead>
            <tbody id="table-pions"></tbody>
        </table>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        socket.emit('orga-init');

        function creerJoueur() {
            const nom = document.getElementById('new-nom').value;
            const tel = document.getElementById('new-tel').value;
            if (!nom) return alert("Renseigne au moins le nom !");
            socket.emit('orga-create-player-direct', { nom, tel });
        }

        socket.on('player-created-success', (data) => {
            document.getElementById('display-created-code').innerHTML = `✅ JOUEUR CRÉÉ !<br><span style="font-size:1.4rem; color:#10b981;">${data.nom} ➔ CODE : ${data.code}</span>`;
            document.getElementById('pdf-code').value = data.code;
            document.getElementById('new-nom').value = '';
            document.getElementById('new-tel').value = '';
        });

        function envoyerPDF() {
            const code = document.getElementById('pdf-code').value;
            const serie = document.getElementById('pdf-serie').value;
            const fichier = document.getElementById('pdf-fichier').value;
            const pStart = document.getElementById('pdf-page-start').value;
            const pEnd = document.getElementById('pdf-page-end').value;

            if (!code) return alert("Saisis le code du joueur !");

            socket.emit('orga-deliver-pdf', { code, serie, fichierUrl: `/pdf/${fichier}`, pageDebut: pStart, pageFin: pEnd });
            alert(`✅ Ticket envoyé au code ${code}`);
        }

        socket.on('refresh-orga', (data) => {
            const tbody = document.getElementById('table-pions');
            tbody.innerHTML = '';
            data.orders.forEach(o => {
                tbody.innerHTML += `<tr>
                    <td>${o.nom}</td>
                    <td>${o.code}</td>
                    <td>${o.qte}</td>
                    <td><button class="btn-gold" style="padding:4px;" onclick="validerPions(${o.id})">Valider</button></td>
                </tr>`;
            });
        });

        function validerPions(id) { socket.emit('admin-validate-order', id); }
        socket.on('notification-staff', (msg) => { alert(msg); });
    </script>
</body>
</html>
