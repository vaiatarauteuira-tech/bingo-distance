<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Fenua Bingo - Espace Organisateur</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #121212;
      color: white;
      margin: 0;
      padding: 20px;
    }
    
    /* En-tête */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1f1f1f;
      padding: 15px 20px;
      border-radius: 10px;
    }

    /* Bouton Micro */
    .btn-micro {
      padding: 10px 20px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      background-color: #e74c3c;
      color: white;
    }
    .btn-micro.active {
      background-color: #2ecc71;
    }

    /* Boulier / Plateau de perles */
    .boulier-container {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(15, 1fr);
      gap: 10px;
    }

    /* Styles des Perles Non-tirées */
    .perle {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background-color: #000;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 16px;
      border: 1px solid #333;
    }

    /* Couleurs des Perles Tirées (Mode 75) */
    .perle.b-tiré { background-color: #ffffff; color: #000; } /* B: Blanc */
    .perle.i-tiré { background-color: #e74c3c; color: #fff; } /* I: Rouge */
    .perle.n-tiré { background-color: #3498db; color: #fff; } /* N: Bleu */
    .perle.g-tiré { background-color: #9b59b6; color: #fff; } /* G: Mauve */
    .perle.o-tiré { background-color: #2ecc71; color: #fff; } /* O: Vert */

    /* Couleurs pour Mode 90 */
    .perle.m90-tiré { background-color: #9b59b6; color: #fff; } /* Mauve */

    /* Overlay Alerte Rouge PAINA */
    #paina-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255, 0, 0, 0.85);
      z-index: 999;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .paina-box {
      background: white;
      color: black;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      max-width: 400px;
    }

    .btn-valider { background-color: #2ecc71; color: white; padding: 10px 20px; border: none; font-size: 18px; margin: 10px; cursor: pointer; border-radius: 5px; }
    .btn-refuser { background-color: #e74c3c; color: white; padding: 10px 20px; border: none; font-size: 18px; margin: 10px; cursor: pointer; border-radius: 5px; }

    /* Navigation du bas - 5 Perles */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; width: 100%;
      background: #1f1f1f;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
    }
    .nav-perle {
      width: 40px; height: 40px; border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #ffd700, #b8860b);
      display: flex; align-items: center; justify-content: center;
      color: black; font-weight: bold; cursor: pointer; text-decoration: none;
      font-size: 12px;
    }
  </style>
</head>
<body>

  <!-- EN-TÊTE -->
  <header>
    <div>
      <h1>FENUA BINGO</h1>
      <h2>IAORANA <span id="orga-name">ORGANISATEUR</span> !</h2>
    </div>
    <!-- BOUTON MICRO -->
    <button id="btn-micro" class="btn-micro" onclick="toggleMicro()">🎙️ MICRO : DÉSACTIVÉ</button>
  </header>

  <!-- CONTROLES TIRAGE -->
  <div style="margin-top: 20px;">
    <button onclick="tirerNumero()" style="padding: 15px 30px; font-size: 18px; cursor: pointer;">🎲 TIRER UNE PERLE</button>
    <span id="dernier-tirage" style="font-size: 24px; font-weight: bold; margin-left: 20px;">Dernier tirage : -</span>
  </div>

  <!-- BOULIER -->
  <div class="boulier-container" id="boulier">
    <!-- Les 75 ou 90 perles seront générées ici en JavaScript -->
  </div>

  <!-- POPUP ALERTE PAINAHIA (ÉCRAN ROUGE) -->
  <div id="paina-overlay">
    <div class="paina-box">
      <h2 style="color: red;">🚨 ALERTE PAINA !</h2>
      <p><strong>Joueur :</strong> <span id="paina-joueur">Teiva</span></p>
      <p><strong>Numéro / Fiche :</strong> <span id="paina-fiche">Série A - N° 12</span></p>

      <div>
        <button class="btn-valider" onclick="validerPaina()">✅ VALIDER</button>
        <button class="btn-refuser" onclick="refuserPaina()">❌ REFUSER (MALAISE)</button>
      </div>
    </div>
  </div>

  <!-- 5 PERLES NAVIGATION DU BAS -->
  <div class="bottom-nav">
    <div class="nav-perle" title="Jeu">JEU</div>
    <div class="nav-perle" title="Lots">LOTS</div>
    <div class="nav-perle" title="Joueurs">JOUEURS</div>
    <div class="nav-perle" title="Historique">HISTO</div>
    <div class="nav-perle" title="Mon Compte">COMPTE</div>
  </div>

  <script>
    // 1. INITIALISATION DU BOULIER 1 À 75
    const boulierElement = document.getElementById('boulier');
    let numerosTires = [];

    function initialiserBoulier(max = 75) {
      boulierElement.innerHTML = '';
      for (let i = 1; i <= max; i++) {
        const perle = document.createElement('div');
        perle.className = 'perle';
        perle.id = `perle-${i}`;
        perle.innerText = i;
        boulierElement.appendChild(perle);
      }
    }
    initialiserBoulier(75); // Par défaut mode 75

    // 2. GESTION DU MICRO
    let microActif = false;
    function toggleMicro() {
      microActif = !microActif;
      const btn = document.getElementById('btn-micro');
      if (microActif) {
        btn.innerText = "🎙️ MICRO : ACTIVÉ";
        btn.classList.add('active');
        // Activer la capture audio/diffusion ici
      } else {
        btn.innerText = "🎙️ MICRO : DÉSACTIVÉ";
        btn.classList.remove('active');
        // Couper la diffusion ici
      }
    }

    // 3. TIRAGE DU NUMÉRO
    function tirerNumero() {
      let num;
      do {
        num = Math.floor(Math.random() * 75) + 1;
      } while (numerosTires.includes(num) && numerosTires.length < 75);

      numerosTires.push(num);
      
      // Déterminer la lettre et la couleur
      let lettre = '';
      let classeCouleur = '';

      if (num <= 15) { lettre = 'B'; classeCouleur = 'b-tiré'; }
      else if (num <= 30) { lettre = 'I'; classeCouleur = 'i-tiré'; }
      else if (num <= 45) { lettre = 'N'; classeCouleur = 'n-tiré'; }
      else if (num <= 60) { lettre = 'G'; classeCouleur = 'g-tiré'; }
      else { lettre = 'O'; classeCouleur = 'o-tiré'; }

      document.getElementById('dernier-tirage').innerText = `Dernier tirage : ${lettre} ${num}`;

      // Colorer la perle correspondante
      const perle = document.getElementById(`perle-${num}`);
      if (perle) perle.classList.add(classeCouleur);
    }

    // 4. RÉCEPTION DU PAINA (Simulation pour le test)
    function recevoirAlertePaina(nomJoueur, numFiche) {
      document.getElementById('paina-joueur').innerText = nomJoueur;
      document.getElementById('paina-fiche').innerText = numFiche;
      document.getElementById('paina-overlay').style.display = 'flex';
    }

    // 5. DECISION PAINA
    function validerPaina() {
      document.getElementById('paina-overlay').style.display = 'none';
      alert("Message envoyé aux joueurs : UA PAINA HIA MEAMA MA");
      // Envoyer l'événement en temps réel aux joueurs via WebSocket/Socket.io/Firebase
    }

    function refuserPaina() {
      document.getElementById('paina-overlay').style.display = 'none';
      alert("Message envoyé aux joueurs : ÇA CONTINUE !");
      // Envoyer l'événement en temps réel aux joueurs via WebSocket/Socket.io/Firebase
    }
  </script>
</body>
</html>

<!-- Charger le SDK Socket.io client -->
<script src="/socket.io/socket.io.js"></script>

<script>
  // Connexion automatique au serveur Node (sur Railway)
  const socket = io();

  const codeAcces = "FENUA2026"; // Code entré par l'organisateur

  // --- A. Connexion Organisateur ---
  fetch('/api/login-orga', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ code: codeAcces })
  })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      document.getElementById('orga-name').innerText = data.nom;
      socket.emit('ORGA_CONNECT', data.nom);
    } else {
      alert(data.message);
    }
  });

  // --- B. Action de tirage ---
  function boutonTirerClic() {
    socket.emit('TIRER_PERLE');
  }

  // Écouter le tirage envoyé par le serveur
  socket.on('NOUVELLE_PERLE', (data) => {
    console.log("Nouvelle perle reçue :", data.lettre, data.numero);
    // Mettre à jour l'affichage de la perle colorée sur la grille HTML
  });

  // --- C. Gestion de l'écran ROUGE (PAINA) ---
  socket.on('ALERTE_PAINA_DEBUT', (info) => {
    // Afficher le popup + figer en Rouge
    document.getElementById('paina-overlay').style.display = 'flex';
    document.getElementById('paina-joueur').innerText = info.joueur;
    document.getElementById('paina-fiche').innerText = info.fiche;
  });

  // Action du bouton VALIDER (Orga)
  function validerPaina() {
    socket.emit('VALIDER_PAINA');
  }

  // Action du bouton REFUSER / MALAISE (Orga)
  function refuserPaina() {
    socket.emit('REFUSER_PAINA');
  }

  // Écouter le résultat du PAINA
  socket.on('PAINA_RESULTAT', (res) => {
    // Retirer le fond rouge
    document.getElementById('paina-overlay').style.display = 'none';
    
    // Affiche la bannière d'information
    alert(`📢 MESSAGE DIFFUSÉ : ${res.message}`);
  });
</script>
