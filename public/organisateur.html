<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Organisateur - BingoHome</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #05050a; color: #f1f5f9; padding: 15px; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: #12131a; border: 1px solid #222530; border-radius: 12px; padding: 20px; margin-bottom: 15px; }
        h2, h3 { margin-top: 0; color: #38bdf8; text-transform: uppercase; font-size: 1rem; }
        .balance-box { background: #1a1c26; border: 1px solid #2d3142; padding: 12px; border-radius: 8px; text-align: center; margin-bottom: 15px; }
        .balance-val { font-size: 1.5rem; font-weight: bold; color: #f59e0b; }
        button { width: 100%; padding: 12px; background: linear-gradient(135deg, #06b6d4, #0284c7); color: #05050a; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; margin-bottom: 8px; }
        input { width: 100%; padding: 10px; background: #1a1c26; border: 1px solid #2d3142; border-radius: 8px; color: white; box-sizing: border-box; margin-bottom: 12px; text-align: center; }
        .btn-mini { width: auto; padding: 6px 12px; background: #10b981; color: white; margin: 0; font-size: 12px; }
        .data-list { background: #05050a; padding: 8px; border-radius: 6px; font-size: 13px; max-height: 180px; overflow-y: auto; border: 1px solid #2d3142; }
        .item-box { background: #12131a; padding: 10px; border-radius: 6px; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222530; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🎪 Console Organisateur</h2>

        <div class="balance-box">
            <div style="font-size:11px; color:#94a3b8;">MON CRÉDIT DISPONIBLE</div>
            <div class="balance-val" id="txt-orga-credit">0 XPF</div>
        </div>

        <div class="card" style="border-top: 4px solid #10b981;">
            <h3>🪙 Commandes de Pions (Organisateur)</h3>
            <div class="data-list" id="orga-orders-list">Aucune commande.</div>
        </div>

        <!-- BLOC A : BOUTIQUE -->
        <div class="card" style="border-left: 4px solid #f59e0b;">
            <h3>📢 Configurer la vitrine Joueurs</h3>
            <p style="font-size:11px; color:#94a3b8;" id="txt-reserve-info">Fiches en réserve : 0</p>
            <input type="number" id="market-qte" value="10">
            <input type="number" id="market-prix" value="5">
            <button style="background: linear-gradient(135deg, #f59e0b, #d97706); color:#05050a;" onclick="ouvrirMarcheJoueurs()">⚡ Publier les fiches</button>
        </div>

        <!-- 🔥 NOUVEAU MODULE : JOURNAL DES VENTES DE VOTRE SALLE -->
        <div class="card" style="border: 2px solid #a855f7;">
            <h3>📊 Historique des Ventes de Cartons (Votre Salle)</h3>
            <div class="data-list" id="orga-sales-list">Aucune vente effectuée.</div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        socket.emit('orga-init');

        socket.on('refresh-orga', (data) => {
            document.getElementById('txt-orga-credit').textContent = `${data.creditOrganisateur.toLocaleString()} XPF`;
            document.getElementById('txt-reserve-info').textContent = `Fiches totales en réserve : ${data.fichesDisponibles}`;
            
            // 1. Ordres pions orga
            const oZone = document.getElementById('orga-orders-list');
            const ordresPourOrga = data.orders.filter(o => o.destinataire.includes("Organisateur"));
            oZone.innerHTML = ordresPourOrga.length === 0 ? '<div style="color:#64748b;text-align:center;">Aucune.</div>' : '';
            ordresPourOrga.forEach(o => {
                oZone.innerHTML += `<div class="item-box"><span>👤 ${o.nom}<br>🪙 +${o.qte} Pions</span><button class="btn-mini" onclick="socket.emit('admin-validate-order', ${o.id})">Valider</button></div>`;
            });

            // 2. 🔥 MISE À JOUR DU JOURNAL DES VENTES DE LA SALLE
            const sZone = document.getElementById('orga-sales-list');
            if(!data.historiqueVentes || data.historiqueVentes.length === 0) {
                sZone.innerHTML = '<div style="color:#64748b;text-align:center;padding:10px;">Aucun achat de joueur pour l\'instant.</div>';
            } else {
                sZone.innerHTML = '';
                data.historiqueVentes.forEach(s => {
                    sZone.innerHTML += `<div class="item-box" style="border-left:4px solid #a855f7; font-size:12px;">
                        <span>🛒 <strong>${s.nomJoueur}</strong> [${s.codeJoueur}]<br>
                        <small style="color:#94a3b8;">Acheté ${s.quantite} fiches (${s.infoSérie})</small></span>
                        <span style="font-weight:bold; color:#f59e0b;">-${s.pionsDepenses} Pions</span>
                    </div>`;
                });
            }
        });

        socket.on('orga-notification', (msg) => { alert(msg); });
        function ouvrirMarcheJoueurs() { socket.emit('orga-set-vende-fiches', { quantite: document.getElementById('market-qte').value, prix: document.getElementById('market-prix').value }); }
    </script>
</body>
</html>
