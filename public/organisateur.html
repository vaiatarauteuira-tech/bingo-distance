<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Bingo - Espace Organisateur / Animateur</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        button { width: 100%; padding: 15px; font-weight: bold; background: #dc3545; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 18px; }
        .boulier { background: #e2e8f0; padding: 25px; border-radius: 8px; margin: 20px 0; }
        .ball { font-size: 5rem; font-weight: bold; color: #dc3545; margin: 15px 0; }
        .history { text-align: left; background: #f8f9fa; padding: 12px; border-radius: 6px; font-size: 14px; min-height: 50px; color: #4a5568; word-break: break-all; }
    </style>
</head>
<body>
    <div class="container">
        <span style="background:#fd7e14; color:white; padding:4px 10px; border-radius:20px; font-size:12px; font-weight:bold;">🎙️ ESPACE SÉCURISÉ ANIMATEUR</span>
        <h2 style="margin-top:10px;">🔮 Tirage des Boules en Direct</h2>
        
        <div class="boulier">
            <button onclick="tirer()">🔮 TIRER UN NUMÉRO</button>
            <div class="ball" id="live-ball">-</div>
            <strong>Historique du tirage :</strong>
            <div class="history" id="history">Aucun numéro tiré.</div>
        </div>
        
        <div style="background: #edf2f7; padding: 12px; border-radius: 6px; text-align: left; font-size: 14px;">
            📢 <strong>Note micro :</strong> Annoncez le numéro à haute voix dès qu'il apparaît sur l'écran. Tous les joueurs connectés le voient instantanément chez eux.
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        if(sessionStorage.getItem('orgaToken') !== 'valide') { window.location.href = '/'; }

        const socket = io();
        socket.emit('admin-init'); // Récupérer l'état actuel du boulier si déconnexion

        socket.on('refresh-admin', ({ history }) => {
            document.getElementById('history').textContent = history.join(', ') || "Aucun numéro tiré.";
            document.getElementById('live-ball').textContent = history[history.length - 1] || "-";
        });

        function tirer() { socket.emit('admin-draw'); }
    </script>
</body>
</html>
