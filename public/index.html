<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌺PA'INA 987🌺 - Connexion</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #05050a; color: #f1f5f9; margin: 0; padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh; box-sizing: border-box; }
        .login-card { background: #12131a; border: 1px solid #222530; border-radius: 16px; padding: 20px; width: 100%; max-width: 380px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; }
        .logo { font-size: 2rem; font-weight: 900; color: #f59e0b; margin-bottom: 5px; text-transform: uppercase; }
        .sub-logo { font-size: 12px; color: #94a3b8; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; background: #1a1c26; border: 1px solid #2d3142; border-radius: 8px; color: white; box-sizing: border-box; margin-bottom: 12px; font-size: 15px; text-align: center; font-weight: bold; }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px; }
        .btn-gold { background: linear-gradient(135deg, #f59e0b, #d97706); color: #05050a; }
        .staff-nav-box { margin-top: 25px; padding-top: 15px; border-top: 1px solid #222530; display: flex; justify-content: space-between; gap: 10px; }

.btn-purple {
    background: linear-gradient(135deg, #a855f7, #7e22ce);
    color: white;
    margin-top: 10px;
}



        .staff-btn { color: #64748b; font-size: 11px; font-weight: bold; background: #1a1c26; padding: 8px 12px; border-radius: 6px; border: 1px solid #2d3142; flex: 1; cursor: pointer; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo"> 🌺🥥 PA'INA 987 🥥🌺 </div>
        <div class="sub-logo">Espace Joueur - Entrez votre code unique</div>

        <input type="text" id="input-code" placeholder="Code Joueur (ex: BH-1234)">
        <button class="btn-gold" onclick="seConnecter()">🎮 S'identifier & Jouer</button>

<div style="font-size:12px; color:#94a3b8; margin-top:15px;">
    Vous n'avez pas de code ?
</div>

<button class="btn-purple" onclick="afficherDemande()">
    ✍️ Demander un Code d'Accès
</button>

<div id="box-demande" style="display:none; margin-top:15px;">
    <input type="text" id="reg-nom" placeholder="Votre Nom et Prénom">
    <input type="tel" id="reg-tel" placeholder="Votre Numéro de Téléphone">
    <button class="btn-gold" onclick="envoyerDemande()">
        Envoyer la demande à la régie
    </button>
</div>


        <div class="staff-nav-box">
            <button class="staff-btn" onclick="ouvrirStaff('orga')">🎪 Organisateur</button>
            <button class="staff-btn" onclick="ouvrirStaff('admin')">🛡️ Admin</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        function seConnecter() {
            const codeInput = document.getElementById('input-code').value.trim().toUpperCase();
            if (!codeInput) return alert("Veuillez saisir un code.");

            sessionStorage.setItem('joueurCode', codeInput);
            socket.emit('player-login', codeInput);
        }
function afficherDemande() {
    const box = document.getElementById('box-demande');
    box.style.display = box.style.display === 'block' ? 'none' : 'block';
}


function envoyerDemande() {
    const nom = document.getElementById('reg-nom').value.trim();
    const tel = document.getElementById('reg-tel').value.trim();

    if (!nom || !tel) {
        alert("Remplissez tous les champs.");
        return;
    }

    socket.emit('player-request-registration', { nom, tel });

    alert("Demande envoyée à la régie !");
}



        socket.on('login-success-dashboard', (data) => {
            window.location.href = '/joueur.html';
        });

        socket.on('login-error', (msg) => {
            alert(msg);
            sessionStorage.removeItem('joueurCode');
        });

        function ouvrirStaff(type) {
            const mdp = prompt(`🔑 Mot de passe ${type.toUpperCase()} :`);
            if (type === 'orga' && mdp === 'ORGA2026') window.location.href = '/organisateur.html';
            else if (type === 'admin' && mdp === 'ADMIN2026') window.location.href = '/admin.html';
            else if (mdp !== null) alert("❌ Mot de passe incorrect !");
        }
    </script>
</body>
</html>
