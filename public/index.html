<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Espace Bingo - Portail Officiel</title>
    <style>
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: #05050a; /* Noir de jais pur, fini le violet concurrent */
            color: #f1f5f9; 
            margin: 0; 
            padding: 25px 15px; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            min-height: 100vh; 
            box-sizing: border-box;
        }
        
        /* En-tête Impérial (Changement complet de style) */
        .header-zone {
            text-align: center;
            margin-bottom: 30px;
            margin-top: 10px;
        }
        .crown-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
            display: inline-block;
            filter: drop-shadow(0 4px 10px rgba(245, 158, 11, 0.4));
        }
        .main-title {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 1px;
            margin: 0;
            background: linear-gradient(to right, #f59e0b, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: #64748b;
            font-size: 13px;
            margin-top: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Boîtes de sections au design épuré et asymétrique */
        .space-card { 
            background: #12131a; /* Gris anthracite premium */
            border: 1px solid #222530;
            border-radius: 12px; /* Coins plus fermés pour un look plus pro */
            padding: 22px; 
            margin-bottom: 18px; 
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }
        
        /* Ligne de couleur sur le côté plutôt qu'un titre coloré au milieu */
        .space-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
        }
        .card-joueur::before { background: #38bdf8; }
        .card-orga::before { background: #a855f7; }
        .card-revendeur::before { background: #06b6d4; }
        .card-admin::before { background: #f59e0b; }

        .space-title {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0;
            margin-bottom: 15px;
            color: #94a3b8;
        }

        /* Champs de saisie */
        input { 
            width: 100%; 
            padding: 12px; 
            background: #1a1c26; 
            border: 1px solid #2d3142; 
            border-radius: 8px; 
            color: white; 
            box-sizing: border-box; 
            margin-bottom: 12px; 
            font-size: 15px; 
            text-align: center;
        }
        input:focus {
            outline: none;
            border-color: #64748b;
        }

        /* Boutons avec notre nouvelle charte Or & Cyan */
        button { 
            width: 100%; 
            padding: 12px; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 14px; 
            cursor: pointer; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 10px;
            transition: all 0.2s;
        }
        
        .btn-gold { 
            background: linear-gradient(135deg, #f59e0b, #d97706); 
            color: #05050a; 
        }
        .btn-gold:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3); }
        
        .btn-cyan { 
            background: #06b6d4; 
            color: #05050a; 
        }
        .btn-cyan:hover { background: #0891b2; }

        .btn-dark { 
            background: #1a1c26; 
            color: #94a3b8;
            border: 1px solid #2d3142;
        }
        .btn-dark:hover { color: white; background: #222533; }

        /* Liens d'aide discrets */
        .meta-link {
            display: block;
            text-align: center;
            color: #64748b;
            font-size: 12px;
            text-decoration: none;
            margin-top: 10px;
            font-weight: 500;
        }
        .meta-link:hover { color: #38bdf8; text-decoration: underline; }
    </style>
</head>
<body>

    <!-- LOGO ET ENTÊTE SOUVERAINE -->
    <div class="header-zone">
        <span class="crown-icon">👑</span>
        <h1 class="main-title">Espace Gaming Bingo</h1>
        <div class="subtitle">Portail d'accès sécurisé</div>
    </div>

    <!-- CODE JOUEUR -->
    <div class="space-card card-joueur">
        <div class="space-title">👤 Session Joueur</div>
        <input type="text" id="code-joueur" placeholder="Saisir votre code d'accès">
        <button class="btn-gold" onclick="loginJoueur()">🎯 Valider et Rejoindre</button>
        <button class="btn-dark" onclick="redirigerAchatPions()">🪙 Demande de rechargement</button>
        <a class="meta-link" href="#" onclick="alert('Guide de démarrage rapide disponible en salle.')">Consulter les règles du jeu</a>
    </div>

    <!-- CODE ORGANISATEUR -->
    <div class="space-card card-orga">
        <div class="space-title">🎙️ Régie Animateur</div>
        <input type="password" id="code-orga" placeholder="Clé d'activation organisateur">
        <button class="btn-cyan" onclick="loginOrga()">🎙️ Ouvrir la console de tirage</button>
        <button class="btn-dark" onclick="alert('Grille tarifaire disponible auprès de l\'administrateur principal.')">Consulter les barèmes</button>
    </div>

    <!-- CODE REVENDEUR -->
    <div class="space-card card-revendeur">
        <div class="space-title">🛒 Guichet Revendeur</div>
        <input type="password" id="code-revendeur" placeholder="Code accréditation revendeur">
        <button class="btn-dark" style="width: 100%; color: white; background:#2563eb; border:none;" onclick="loginRevendeur()">Se connecter au guichet</button>
    </div>

    <!-- CODE ADMIN -->
    <div class="space-card card-admin">
        <div class="space-title">🛠️ Direction / Caisse Générale</div>
        <input type="password" id="code-admin" placeholder="Mot de passe Maître">
        <button class="btn-gold" style="background: linear-gradient(135deg, #ec4899, #be185d); color: white;" onclick="loginAdmin()">Ouvrir le coffre-fort</button>
    </div>

    <script>
        function loginJoueur() {
            const code = document.getElementById('code-joueur').value.trim().toUpperCase();
            if(!code) return alert("Veuillez inscrire votre code d'accès.");
            sessionStorage.setItem('joueurCode', code);
            window.location.href = '/joueur.html';
        }

        function redirigerAchatPions() {
            const code = document.getElementById('code-joueur').value.trim().toUpperCase();
            if(!code) return alert("Veuillez saisir votre code d'accès ci-dessus pour ouvrir votre historique.");
            sessionStorage.setItem('joueurCode', code);
            window.location.href = '/joueur.html';
        }

        function loginOrga() {
            const code = document.getElementById('code-orga').value.trim();
            if(code === "ORGA2026") {
                sessionStorage.setItem('orgaToken', 'valide');
                window.location.href = '/organisateur.html';
            } else {
                alert("Clé animateur invalide.");
            }
        }

        function loginRevendeur() {
            alert("Accès revendeur désactivé pour cette session.");
        }

        function loginAdmin() {
            const code = document.getElementById('code-admin').value.trim();
            if(code === "SUPERADMIN") {
                sessionStorage.setItem('adminToken', 'valide');
                window.location.href = '/admin.html';
            } else {
                alert("Code Administrateur incorrect.");
            }
        }
    </script>
</body>
</html>
