<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BingoHome - Connexion</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #05050a; color: #f1f5f9; margin: 0; padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh; box-sizing: border-box; }
        .login-card { background: #12131a; border: 1px solid #222530; border-radius: 16px; padding: 20px; width: 100%; max-width: 380px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; }
        .logo { font-size: 2rem; font-weight: 900; color: #f59e0b; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .sub-logo { font-size: 12px; color: #94a3b8; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; background: #1a1c26; border: 1px solid #2d3142; border-radius: 8px; color: white; box-sizing: border-box; margin-bottom: 12px; font-size: 15px; text-align: center; font-weight: bold; }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .btn-gold { background: linear-gradient(135deg, #f59e0b, #d97706); color: #05050a; }
        .btn-purple { background: #a855f7; color: white; margin-top: 10px; }
        .box-demande { display: none; background: #1a1c26; border: 1px solid #2d3142; padding: 12px; border-radius: 10px; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">🎱 Ticket Bingo</div>
        <div class="sub-logo">Saisissez votre code unique pour jouer</div>

        <!-- FORMULAIRE DE CONNEXION -->
        <input type="text" id="input-code" placeholder="Entrez votre Code (ex: BH-1234)">
        <button class="btn-gold" onclick="seConnecter()">🎮 S'identifier & Jouer</button>

        <hr style="border:0; border-top:1px solid #222530; margin: 20px 0;">

        <div style="font-size:12px; color:#94a3b8;">Vous n'avez pas de code ?</div>
        <button class="btn-purple" onclick="afficherDemande()">✍️ Demander un Code d'Accès</button>

        <!-- FORMULAIRE DE DEMANDE D'INSCRIPTION -->
        <div class="box-demande" id="box-demande">
            <div style="font-size:13px; font-weight:bold; color:#a855f7; margin-bottom:10px;">Inscription Tournoi</div>
            <input type="text" id="reg-nom" placeholder="Votre Nom et Prénom">
            <input type="tel" id="reg-tel" placeholder="Votre Numéro de Téléphone">
            <button class="btn-gold" onclick="envoyerDemande()">Envoyer la demande à la régie</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        function seConnecter() {
            const codeInput = document.getElementById('input-code').value.trim().toUpperCase();
            if (!codeInput) return alert("Veuillez saisir un code.");

            sessionStorage.setItem('joueurCode', codeInput);
            socket.emit('player-login', codeInput);
        }

        socket.on('login-success-dashboard', (data) => {
            window.location.href = '/joueur.html';
        });

        // 🛑 SI LE CODE EST REJETÉ PAR LE SERVEUR
        socket.on('login-error', (msg) => {
            alert(msg || "❌ Code invalide !");
            sessionStorage.removeItem('joueurCode');
            document.getElementById('input-code').value = '';
        });

        function afficherDemande() {
            const box = document.getElementById('box-demande');
            box.style.display = box.style.display === 'block' ? 'none' : 'block';
        }

        function envoyerDemande() {
            const nom = document.getElementById('reg-nom').value.trim();
            const tel = document.getElementById('reg-tel').value.trim();

            if (!nom || !tel) return alert("Remplissez tous les champs.");

            socket.emit('player-request-registration', { nom, tel });
        }

        socket.on('registration-status', (res) => {
            if (res.status === 'submitted') {
                alert("✅ Demande transmise ! L'organisateur va valider votre compte et vous remettre votre code.");
                document.getElementById('box-demande').style.display = 'none';
            } else if (res.status === 'already_active') {
                alert(`⚠️ Un compte existe déjà avec ce numéro ! Votre code est : ${res.code}`);
                document.getElementById('input-code').value = res.code;
            }
        });
    </script>
</body>
</html>
