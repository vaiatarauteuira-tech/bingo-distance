<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Bingo - Choisissez votre espace</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #0b0c1e; /* Fond violet/noir très sombre de la capture */
            color: #f8fafc; 
            margin: 0; 
            padding: 20px 10px; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            min-height: 100vh; 
            box-sizing: border-box;
        }
        
        /* En-tête avec la boule 8 */
        .header-zone {
            text-align: center;
            margin-bottom: 25px;
            margin-top: 10px;
        }
        .ball-logo {
            width: 70px;
            height: 70px;
            background: radial-gradient(circle at 30% 30%, #4b5563, #111827, #030712);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            margin: 0 auto 15px auto;
        }
        .ball-inner {
            width: 32px;
            height: 32px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: black;
            font-weight: 900;
            font-size: 18px;
        }
        .main-title {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: -1px;
            margin: 0;
            text-transform: uppercase;
            color: white;
        }
        .subtitle {
            color: #8b9bb4;
            font-size: 13px;
            margin-top: 5px;
        }

        /* Conteneurs de blocs d'espaces */
        .space-card { 
            background: #141733; /* Teinte violette foncée des compartiments */
            border: 1px solid #222654;
            border-radius: 16px; 
            padding: 20px; 
            margin-bottom: 20px; 
            width: 100%;
            max-width: 420px;
            box-sizing: border-box;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .space-title {
            font-size: 15px;
            font-weight: 700;
            text-align: center;
            margin-top: 0;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .title-joueur { color: #10b981; }
        .title-orga { color: #f43f5e; }
        .title-revendeur { color: #3b82f6; }
        .title-admin { color: #f59e0b; }

        /* Champs de saisie intégrés aux blocs */
        input { 
            width: 100%; 
            padding: 14px; 
            background: #1c204d; 
            border: 1px solid #2d337a; 
            border-radius: 10px; 
            color: white; 
            box-sizing: border-box; 
            margin-bottom: 12px; 
            font-size: 15px; 
            text-align: center;
            font-weight: bold;
            letter-spacing: 1px;
        }
        input::placeholder {
            color: #5661a5;
            text-transform: uppercase;
        }

        /* Boutons personnalisés calqués sur le modèle */
        button { 
            width: 100%; 
            padding: 14px; 
            border: none; 
            border-radius: 10px; 
            font-weight: bold; 
            font-size: 15px; 
            cursor: pointer; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 10px;
            transition: 0.2s;
        }
        .btn-green { background: #10b981; color: white; } .btn-green:hover { background: #059669; }
        .btn-purple { background: #6366f1; color: white; } .btn-purple:hover { background: #4f46e5; }
        .btn-blue { background: #2563eb; color: white; }
        .btn-orange { background: #f59e0b; color: white; }

        /* Liens guides informatifs clairs sous les boutons */
        .guide-link {
            display: block;
            text-align: center;
            color: #10b981;
            font-size: 13px;
            text-decoration: underline;
            margin-top: 12px;
            cursor: pointer;
        }
        .guide-orga { color: #3b82f6; }
    </style>
</head>
<body>

    <!-- ZONE DE REPRODUCTION LOGO BOULE ET TITRE -->
    <div class="header-zone">
        <div class="ball-logo"><div class="ball-inner">8</div></div>
        <h1 class="main-title">Ticket Bingo</h1>
        <div class="subtitle">Choisissez votre espace</div>
    </div>

    <!-- MODULE JOUEUR -->
    <div class="space-card">
        <h3 class="space-title title-joueur">🎮 Espace Joueur</h3>
        <input type="text" id="code-joueur" placeholder="VOTRE CODE TICKET">
        <button class="btn-green" onclick="loginJoueur()">🎯 Jouer maintenant !</button>
        <button class="btn-purple" onclick="redirigerAchatPions()">🪙 Commander des pions</button>
        <span class="guide-link" onclick="alert('Ouverture du guide joueur...')">📖 Comment jouer ? Le guide en 2 minutes</span>
    </div>

    <!-- MODULE ORGANISATEUR -->
    <div class="space-card">
        <h3 class="space-title title-orga">🎪 Espace Organisateur</h3>
        <input type="password" id="code-orga" placeholder="VOTRE CODE ORGANISATEUR">
        <button class="btn-purple" onclick="loginOrga()">🎪 Accéder à mon espace</button>
        <button class="btn-purple" style="background: #1e235a;" onclick="alert('Plages tarifaires d\'organisation standard')">💰 Nos prix</button>
        <span class="guide-link guide-orga" style="margin-bottom: 5px;" onclick="alert('Formulaire de demande...')">📋 Demander un accès organisateur</span>
        <span class="guide-link guide-orga" onclick="alert('Ouverture du guide animateur...')">📘 Comment organiser ? Le guide en 2 minutes</span>
    </div>

    <!-- MODULE REVENDEUR -->
    <div class="space-card">
        <h3 class="space-title title-revendeur">🛒 Espace Revendeur</h3>
        <input type="password" id="code-revendeur" placeholder="VOTRE CODE REVENDEUR">
        <button class="btn-blue" onclick="loginRevendeur()">🛒 Accéder à mon espace</button>
    </div>

    <!-- MODULE MAÎTRE ADMIN -->
    <div class="space-card" style="margin-bottom: 5px;">
        <h3 class="space-title title-admin">👑 Espace Admin</h3>
        <input type="password" id="code-admin" placeholder="CODE ADMINISTRATEUR">
        <button class="btn-orange" onclick="loginAdmin()">👑 Accéder à l'admin</button>
    </div>

    <script>
        function loginJoueur() {
            const code = document.getElementById('code-joueur').value.trim().toUpperCase();
            if(!code) return alert("Veuillez saisir votre code ticket.");
            sessionStorage.setItem('joueurCode', code);
            window.location.href = '/joueur.html';
        }

        function redirigerAchatPions() {
            const code = document.getElementById('code-joueur').value.trim().toUpperCase();
            if(!code) return alert("Veuillez d'abord inscrire votre code ticket dans la case ci-dessus pour commander.");
            sessionStorage.setItem('joueurCode', code);
            window.location.href = '/joueur.html'; // Redirige directement vers son relevé d'achat de pions
        }

        function loginOrga() {
            const code = document.getElementById('code-orga').value.trim();
            if(code === "ORGA2026") {
                sessionStorage.setItem('orgaToken', 'valide');
                window.location.href = '/organisateur.html';
            } else {
                alert("Code Organisateur incorrect.");
            }
        }

        function loginRevendeur() {
            alert("Espace revendeur en cours de maintenance.");
        }

        function loginAdmin() {
            const code = document.getElementById('code-admin').value.trim();
            if(code === "SUPERADMIN") {
                sessionStorage.setItem('adminToken', 'valide');
                window.location.href = '/admin.html';
            } else {
                alert("Code Administrateur incorrect.");
            }
        }
    </script>
</body>
</html>
