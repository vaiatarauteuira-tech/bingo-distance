<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Bingo Événementiel - Joueur</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; text-align: center; }
        .container { max-width: 450px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .pions-box { display: flex; gap: 10px; margin: 15px 0; }
        .pion { flex: 1; background: #f8f9fa; padding: 10px; border-radius: 4px; border: 1px solid #eee; }
        .board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin: 15px 0; background: #1a202c; padding: 8px; border-radius: 6px; }
        .cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: white; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .cell.marked { background: #48bb78; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h2>👤 Connexion Joueur</h2>
        <div id="login-zone">
            <input type="text" id="code-in" placeholder="Entrez votre code BINGO-XXXX">
            <button onclick="login()">Rejoindre la Partie</button>
        </div>

        <div id="game-zone" style="display:none;">
            <h3 id="p-name">Joueur</h3>
            <div style="background:#fff3cd; font-size:1.8rem; font-weight:bold; padding:10px; border-radius:6px; margin-bottom:10px; color:#dc3545;">
                📢 Numéro Tiré : <span id="live-ball">-</span>
            </div>

            <h4>🎒 Vos Pions :</h4>
            <div class="pions-box">
                <div class="pion">Pions 20<h3 id="p20">0</h3></div>
                <div class="pion">Pions 50<h3 id="p50">0</h3></div>
                <div class="pion">Pions 100<h3 id="p100">0</h3></div>
            </div>

            <div class="board" id="bingo-board"></div>

            <div style="background:#edf2f7; padding:12px; border-radius:6px; text-align:left;">
                <h4 style="margin:0 0 5px 0;">💳 Recharger par virement :</h4>
                <select id="b-type"><option value="p20">Pions de 20</option><option value="p50">Pions de 50</option><option value="p100">Pions de 100</option></select>
                <input type="number" id="b-qte" value="5" min="1">
                <button onclick="commander()" style="background:#dd6b20;">Envoyer la demande</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let monCode = "";

        function login() {
            monCode = document.getElementById('code-in').value.trim().toUpperCase();
            socket.emit('player-login', monCode);
        }

        socket.on('login-success', (player) => {
            document.getElementById('login-zone').style.display = 'none';
            document.getElementById('game-zone').style.display = 'block';
            document.getElementById('p-name').textContent = `👋 ${player.nom}`;
            updatePionsView(player);
            
            // Grille
            const b = document.getElementById('bingo-board');
            b.innerHTML = '';
            player.grille.forEach((num, idx) => {
                const c = document.createElement('div');
                c.className = 'cell';
                if(idx === 12) { c.textContent = "FREE"; c.classList.add('marked'); }
                else { c.textContent = num; c.onclick = () => c.classList.toggle('marked'); }
                b.appendChild(c);
            });
        });

        socket.on('login-error', () => alert("Code invalide ! L'admin doit initialiser la partie."));
        socket.on('new-ball', (data) => document.getElementById('live-ball').textContent = data.actuelle);
        socket.on('update-pions', (player) => updatePionsView(player));
        socket.on('game-reset', () => window.location.reload());

        function updatePionsView(p) {
            document.getElementById('p20').textContent = p.p20;
            document.getElementById('p50').textContent = p.p50;
            document.getElementById('p100').textContent = p.p100;
        }

        function commander() {
            const type = document.getElementById('b-type').value;
            const qte = document.getElementById('b-qte').value;
            socket.emit('player-order', { code: monCode, type, qte });
            alert("Demande envoyée !");
        }
    </script>
</body>
</html>
